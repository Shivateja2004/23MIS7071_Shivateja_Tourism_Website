<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Admin')}"></head><body><nav th:replace="~{layout :: nav}"></nav><main class="container py-5"><h1>Admin Dashboard</h1><div class="row g-3"><div class="col-md-4"><div class="stat" th:text="${attractionCount} + ' attractions'"></div></div><div class="col-md-4"><div class="stat" th:text="${hotelCount} + ' hotels'"></div></div><div class="col-md-4"><div class="stat" th:text="${messageCount} + ' messages'"></div></div></div><h2 class="mt-4">Contact Messages</h2><table class="table"><thead><tr><th>Name</th><th>Email</th><th>Message</th></tr></thead><tbody><tr th:each="msg:${messages}"><td th:text="${msg.name()}"></td><td th:text="${msg.email()}"></td><td th:text="${msg.message()}"></td></tr></tbody></table></main><footer th:replace="~{layout :: footer}"></footer></body></html>
