<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Hotels')}"></head><body><nav th:replace="~{layout :: nav}"></nav><main class="container py-5"><h1>Hotels</h1><div class="table-responsive"><table class="table table-striped align-middle"><thead><tr><th>Name</th><th>City</th><th>Rating</th><th>Booking</th></tr></thead><tbody><tr th:each="hotel:${hotels}"><td th:text="${hotel.name()}"></td><td th:text="${hotel.city()}"></td><td th:text="${hotel.rating()}"></td><td><a class="btn btn-sm btn-primary" th:href="${hotel.bookingUrl()}" target="_blank">Open</a></td></tr></tbody></table></div></main><footer th:replace="~{layout :: footer}"></footer></body></html>
