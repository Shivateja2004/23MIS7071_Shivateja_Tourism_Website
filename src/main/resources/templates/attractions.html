<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Attractions')}"></head><body><nav th:replace="~{layout :: nav}"></nav><main class="container py-5"><h1>Tourist Attractions</h1><div class="row g-3"><div class="col-md-6" th:each="item:${attractions}"><article class="card h-100"><div class="card-body"><span class="badge text-bg-info" th:text="${item.category()}"></span><h2 th:text="${item.name()}"></h2><p th:text="${item.description()}"></p><strong th:text="${item.location()}"></strong></div></article></div></div></main><footer th:replace="~{layout :: footer}"></footer></body></html>
