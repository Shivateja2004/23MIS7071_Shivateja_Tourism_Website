<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Contact')}"></head><body><nav th:replace="~{layout :: nav}"></nav><main class="container py-5"><h1>Contact Form</h1><div th:if="${success}" class="alert alert-success" th:text="${success}"></div><form class="contact-form" method="post" action="/contact"><label>Name<input class="form-control" name="name" required></label><label>Email<input class="form-control" name="email" type="email" required></label><label>Message<textarea class="form-control" name="message" rows="5" required></textarea></label><button class="btn btn-primary" type="submit">Send Message</button></form></main><footer th:replace="~{layout :: footer}"></footer></body></html>
