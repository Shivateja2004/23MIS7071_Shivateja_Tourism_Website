<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{layout :: head('Guides')}"></head><body><nav th:replace="~{layout :: nav}"></nav><main class="container py-5"><h1>Travel Guides and Tips</h1><div class="row g-3"><div class="col-md-6" th:each="guide:${guides}"><div class="card h-100"><div class="card-body"><h2 th:text="${guide.title()}"></h2><p th:text="${guide.summary()}"></p><span class="badge text-bg-success" th:text="${guide.season()}"></span></div></div></div></div><section class="tips mt-4"><h2>Quick Tips</h2><ul><li>Carry valid ID and digital copies.</li><li>Check weather and local advisories.</li><li>Use verified booking links and official counters.</li><li>Keep emergency contacts offline.</li></ul></section></main><footer th:replace="~{layout :: footer}"></footer></body></html>
